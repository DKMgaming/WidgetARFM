<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger-style Chat Widget</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

    <style>
        :root {
            /* Messenger-like color scheme */
            --chat--color-primary: #007bff;
            --chat--color-primary-shade-50: #0069d9;
            --chat--color-secondary: #0084ff;
            --chat--color-light: #f5f6f7;
            --chat--color-dark: #1c1c1c;

            /* General styling */
            --chat--border-radius: 1.5rem;
            --chat--window--border-radius: 0.75rem;
            --chat--window--width: 350px;
            --chat--window--height: 600px;
            --chat--button--border-radius: 2rem;

            /* Compact Header Styling */
            --chat--header--background: #0084ff;
            --chat--header--color: #ffffff;
            --chat--header--padding: 0.8rem 1rem; /* Adjust padding to make it smaller */
            --chat--heading--font-size: 1em;    /* Smaller title font size */
            --chat--subtitle--font-size: 0.8em; /* Smaller subtitle font size */

            /* Message styling */
            --chat--message--padding: 0.75rem 1rem;
            --chat--message--bot--background: #f5f6f7;
            --chat--message--bot--color: var(--chat--color-dark);
            --chat--message--user--background: #0084ff;
            --chat--message--user--color: #ffffff;
            --chat--message-user-border-radius: 1.5rem 1.5rem 0.3rem 1.5rem;
            --chat--message-bot-border-radius: 1.5rem 1.5rem 1.5rem 0.3rem;
            --chat--message--box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);

            /* Input styling */
            --chat--textarea--height: 40px;
        }

        body {
            font-family: 'Roboto', sans-serif;
        }

        .chat-container {
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1);
        }

        .chat-message {
            box-shadow: var(--chat--message--box-shadow);
        }
    </style>
</head>
<body>
    <div style="padding: 20px; text-align: center;">
        <h1>Chào mừng đến với trang web Hỗ trợ về tần số vô tuyến điện!</h1>
        <p>Nhấn vào biểu tượng chat ở góc dưới cùng bên phải để trò chuyện với chúng tôi.</p>
    </div>

    <div id="n8n-chat"></div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            webhookUrl: 'https://semituberous-recreantly-jerald.ngrok-free.dev/webhook/40c8abaf-a681-458f-8878-ce61d8c59ba8/chat',
            initialMessages: [
                'Chào bạn! 👋',
                'Tôi có thể giúp gì cho bạn hôm nay?'
            ],
            showWelcomeScreen: true,
            i18n: {
                en: {
                    title: 'Trò chuyện với chúng tôi',
                    subtitle: 'Chúng tôi sẵn lòng hỗ trợ bạn 24/7.',
                    footer: '',
                    getStarted: 'Bắt đầu trò chuyện',
                    inputPlaceholder: 'Nhập tin nhắn...',
                },
            }
        });
    </script>
</body>
</html>
